# 03 - Self-consumption % (gauge + bar trend)
#
# Uses sensor.battery_roi_self_consumption directly — this sensor
# already exists (sensor.py, _KEY_SELF_CONSUMPTION), no gap here.
#
# Requires HACS card: apexcharts-card

type: custom:apexcharts-card
header:
  show: true
  title: Self-Consumption %
graph_span: 30d
apex_config:
  chart:
    type: radialBar
  plotOptions:
    radialBar:
      hollow:
        size: "60%"
      dataLabels:
        value:
          formatter: |
            EVAL:function(val) { return val.toFixed(1) + "%"; }
series:
  - entity: sensor.battery_roi_self_consumption
    name: Self-consumption
    show:
      in_header: false
---
# Alternative: plain gauge card (no custom card needed)
type: gauge
entity: sensor.battery_roi_self_consumption
name: Self-Consumption
min: 0
max: 100
severity:
  green: 60
  yellow: 30
  red: 0
