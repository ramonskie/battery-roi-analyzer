# 05 - Monthly heatmap: PV / battery usage / grid import / export
#
# Uses the `monthly_data` attribute on sensor.battery_roi_best_size,
# which exposes monthly aggregates (exported_kwh, battery_in_kwh,
# battery_out_kwh, imported_kwh, pv_kwh) per "YYYY-MM" key.
#
# Requires HACS card: apexcharts-card (heatmap series type)
# https://github.com/RomRider/apexcharts-card

type: custom:apexcharts-card
header:
  show: true
  title: Monthly Energy Flow Heatmap
graph_span: 1y
apex_config:
  chart:
    type: heatmap
  plotOptions:
    heatmap:
      shadeIntensity: 0.5
      colorScale:
        ranges:
          - from: 0
            to: 50
            color: "#00A100"
          - from: 51
            to: 150
            color: "#FFB200"
          - from: 151
            to: 1000
            color: "#FF0000"
series:
  - entity: sensor.battery_roi_best_size
    attribute: monthly_data
    name: PV (kWh)
    type: heatmap
    data_generator: |
      const data = entity.attributes.monthly_data || {};
      return Object.entries(data).map(
        ([month, vals]) => [month + '-01', vals.pv_kwh || 0]
      );
  - entity: sensor.battery_roi_best_size
    attribute: monthly_data
    name: Battery in (kWh)
    type: heatmap
    data_generator: |
      const data = entity.attributes.monthly_data || {};
      return Object.entries(data).map(
        ([month, vals]) => [month + '-01', vals.battery_in_kwh || 0]
      );
  - entity: sensor.battery_roi_best_size
    attribute: monthly_data
    name: Battery out (kWh)
    type: heatmap
    data_generator: |
      const data = entity.attributes.monthly_data || {};
      return Object.entries(data).map(
        ([month, vals]) => [month + '-01', vals.battery_out_kwh || 0]
      );
  - entity: sensor.battery_roi_best_size
    attribute: monthly_data
    name: Grid export (kWh)
    type: heatmap
    data_generator: |
      const data = entity.attributes.monthly_data || {};
      return Object.entries(data).map(
        ([month, vals]) => [month + '-01', vals.exported_kwh || 0]
      );
  - entity: sensor.battery_roi_best_size
    attribute: monthly_data
    name: Grid import (kWh)
    type: heatmap
    data_generator: |
      const data = entity.attributes.monthly_data || {};
      return Object.entries(data).map(
        ([month, vals]) => [month + '-01', vals.imported_kwh || 0]
      );
