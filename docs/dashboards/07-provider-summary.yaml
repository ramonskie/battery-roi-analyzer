# 07 - Provider comparison (markdown summary)
#
# Shows best fixed / dynamic / overall contract names with annual costs,
# both with and without battery. Uses the `rankings` attribute on
# sensor.battery_roi_best_overall.
#
# No frontend dependencies — built-in markdown card.

type: markdown
content: |
  ## ⚡ Energy Provider Comparison

  {% set best_fixed = state_attr('sensor.battery_roi_best_overall', 'rankings') | selectattr('type', 'equalto', 'fixed') | first %}
  {% set best_dynamic = state_attr('sensor.battery_roi_best_overall', 'rankings') | selectattr('type', 'equalto', 'dynamic') | first %}
  {% set best_overall = state_attr('sensor.battery_roi_best_overall', 'rankings') | first %}

  | Contract | Annual cost | With {{ best_overall.battery_capacity_kwh | default('?') }} kWh battery |
  |----------|------------|------------|
  | **{{ best_fixed.provider }}** (vast) | €{{ '%.2f' | format(best_fixed.annual_cost_eur | float) }} | €{{ '%.2f' | format(best_fixed.annual_cost_with_battery_eur | float or best_fixed.annual_cost_eur) }} |
  | **{{ best_dynamic.provider }}** (dynamisch) | €{{ '%.2f' | format(best_dynamic.annual_cost_eur | float) }} | €{{ '%.2f' | format(best_dynamic.annual_cost_with_battery_eur | float or best_dynamic.annual_cost_eur) }} |

  **Best overall:** {{ states('sensor.battery_roi_best_overall') }}
  **Cheapest annual cost:** €{{ states('sensor.battery_roi_cheapest_annual_cost') }}
  **Recommended battery:** {{ states('sensor.battery_roi_best_size') }} kWh
